version: "3.9"

services:

  # Should you wish to run the actual-http-api in this stack, you can uncomment the following section and provide the necessary environment variables. Make sure to set up the ACTUAL_SERVER_URL, ACTUAL_SERVER_PASSWORD, and ACTUAL_API_KEY in your .env file or environment for it to work properly.

  # actual-http-api:
  #   image: jhonderson/actual-http-api:latest
  #   ports:
  #     - "5006:5007"
  #   environment:
  #     ACTUAL_SERVER_URL:      "${ACTUAL_SERVER_URL}"
  #     ACTUAL_SERVER_PASSWORD: "${ACTUAL_SERVER_PASSWORD}"
  #     API_KEY:                "${ACTUAL_API_KEY}"
  #   restart: unless-stopped

  cashflow-api:
    image: cashflow-api:latest
    container_name: cashflow-api
    ports:
      - "5008:5008"
    volumes:
      - ./cashflow-data:/app/data
    environment:
      DB_PATH: "/app/data/cashflow.db"
      # Uncomment to require auth:
      # API_KEY: "${CASHFLOW_API_KEY}"
    restart: unless-stopped

  cashflow-dashboard:
    image: cashflow-dashboard:latest
    container_name: cashflow-dashboard
    ports:
      - "5007:5007"
    restart: unless-stopped
