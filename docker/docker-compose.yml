services:
  # Cash Flow Dashboard — Next.js, handles its own SQLite persistence
  cashflow-dashboard:
    container_name: cashflow-dashboard
    image: cashflow-dashboard:latest
    ports:
      - "5006:3000"
    volumes:
      - cashflow-data:/app/data
    environment:
      # Server-side only — never sent to browser
      # Or env.local can be used
      ACTUAL_API_URL: "${ACTUAL_API_URL}"
      ACTUAL_API_KEY: "${ACTUAL_API_KEY}"
      CF_DASHBOARD_PASSWORD: "${CF_DASHBOARD_PASSWORD}"
      DB_PATH:        "${DB_PATH:-/app/data/cashflow.db}"
    restart: unless-stopped
    # depends_on:
    #   - actual-http-api
  
  # Required for the dashboard to work, but it is likely easier to combine this with the Actual budget compose file
  #  
  # actual-http-api — the REST API wrapper for Actual
  # actual-http-api:
  #   image: jhonderson/actual-http-api:latest
  #   ports:
  #     - "5007:5007"
  #   environment:
  #     ACTUAL_SERVER_URL:      "${ACTUAL_SERVER_URL}"
  #     ACTUAL_SERVER_PASSWORD: "${ACTUAL_SERVER_PASSWORD}"
  #     API_KEY:                "${ACTUAL_API_KEY}"
  #   restart: unless-stopped

volumes:
  cashflow-data:
